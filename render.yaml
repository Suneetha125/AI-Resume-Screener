services:
  - type: static
    name: ai-resume-screener
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User will provide this in Render dashboard
